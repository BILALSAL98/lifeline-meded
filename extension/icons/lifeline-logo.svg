  <!-- Magenta -->
  <path d="M34,0 C35,33 34,53 32,66" stroke="#d81b60" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Purple-pink -->
  <path d="M36,0 C38,30 34,52 32,66" stroke="#ab47bc" stroke-width="1.7" stroke-linecap="round"/>
  <!-- Purple -->
  <path d="M38,0 C40,27 34,50 32,66" stroke="#9b5fe0" stroke-width="1.7" stroke-linecap="round"/>
  <!-- Indigo -->
  <path d="M41,0 C42,23 34,48 32,66" stroke="#5c6bc0" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Blue -->
  <path d="M44,0 C44,20 34,46 32,66" stroke="#2196f3" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Light blue -->
